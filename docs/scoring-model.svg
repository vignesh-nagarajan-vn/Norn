<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .disp { fill:#221d15; font-family:"Fraunces", Georgia, serif; }
      .h { fill:#221d15; font-size:14px; font-weight:600; }
      .sub { fill:#665d4c; font-size:12px; }
      .name { fill:#221d15; font-size:12.5px; }
      .tiny { fill:#9a8f79; font-size:11px; }
      .tag { font-size:11px; font-weight:700; letter-spacing:0.06em; }
      .mono { font-family:"JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="540" fill="#f2ede2"/>

  <g stroke="#8a5a2b" stroke-width="1.8" fill="none" transform="translate(892 20)">
    <circle cx="16" cy="11.4" r="6.6"/><circle cx="10.8" cy="20.2" r="6.6"/><circle cx="21.2" cy="20.2" r="6.6"/>
  </g>

  <text x="36" y="42" class="disp" font-size="24" font-weight="600">How Norn scores a variant</text>
  <text x="36" y="63" class="sub">Claude adjudicates each criterion. The engine sums ClinGen Bayesian points and assigns the label in code. BA1 overrides to Benign.</text>

  <!-- Left panel -->
  <rect x="36" y="84" width="430" height="430" rx="12" fill="#fbf8f1" stroke="#ddd3bf" stroke-width="1.5"/>
  <text x="54" y="112" class="h">Ten automated criteria and their points</text>

  <text x="54" y="134" class="tag" fill="#b91c1c">PATHOGENIC EVIDENCE</text>
  <!-- pathogenic rows -->
  <g>
    <g><rect x="54" y="142" width="56" height="22" rx="6" fill="#f7e3e1" stroke="#e6bfbb"/><text x="82" y="157" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#b91c1c">PVS1</text><text x="120" y="157" class="name">Predicted loss of function</text><rect x="398" y="142" width="52" height="22" rx="11" fill="#b91c1c"/><text x="424" y="157" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">+8</text></g>
    <g><rect x="54" y="172" width="56" height="22" rx="6" fill="#f7e3e1" stroke="#e6bfbb"/><text x="82" y="187" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#b91c1c">PS1</text><text x="120" y="187" class="name">Same amino acid as a pathogenic variant</text><rect x="398" y="172" width="52" height="22" rx="11" fill="#b91c1c"/><text x="424" y="187" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">+4</text></g>
    <g><rect x="54" y="202" width="56" height="22" rx="6" fill="#f7e3e1" stroke="#e6bfbb"/><text x="82" y="217" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#b91c1c">PM1</text><text x="120" y="217" class="name">Mutational hotspot or functional domain</text><rect x="398" y="202" width="52" height="22" rx="11" fill="#b91c1c"/><text x="424" y="217" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">+2</text></g>
    <g><rect x="54" y="232" width="56" height="22" rx="6" fill="#f7e3e1" stroke="#e6bfbb"/><text x="82" y="247" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#b91c1c">PM5</text><text x="120" y="247" class="name">New change at a known pathogenic residue</text><rect x="398" y="232" width="52" height="22" rx="11" fill="#b91c1c"/><text x="424" y="247" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">+2</text></g>
    <g><rect x="54" y="262" width="56" height="22" rx="6" fill="#f7e3e1" stroke="#e6bfbb"/><text x="82" y="277" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#b91c1c">PM2</text><text x="120" y="277" class="name">Absent or very rare in gnomAD</text><rect x="398" y="262" width="52" height="22" rx="11" fill="#b91c1c"/><text x="424" y="277" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">+1</text></g>
    <g><rect x="54" y="292" width="56" height="22" rx="6" fill="#f7e3e1" stroke="#e6bfbb"/><text x="82" y="307" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#b91c1c">PP3</text><text x="120" y="307" class="name">Computational evidence of damage</text><rect x="398" y="292" width="52" height="22" rx="11" fill="#b91c1c"/><text x="424" y="307" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">+1</text></g>
  </g>

  <text x="54" y="340" class="tag" fill="#15803d">BENIGN EVIDENCE</text>
  <g>
    <g><rect x="54" y="348" width="56" height="22" rx="6" fill="#e6f2ea" stroke="#bfe0cb"/><text x="82" y="363" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#15803d">BA1</text><text x="120" y="363" class="name">Allele frequency above 5 percent</text><rect x="388" y="348" width="62" height="22" rx="11" fill="#15803d"/><text x="419" y="363" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">override</text></g>
    <g><rect x="54" y="378" width="56" height="22" rx="6" fill="#e6f2ea" stroke="#bfe0cb"/><text x="82" y="393" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#15803d">BS1</text><text x="120" y="393" class="name">Above the disorder frequency threshold</text><rect x="398" y="378" width="52" height="22" rx="11" fill="#15803d"/><text x="424" y="393" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">-4</text></g>
    <g><rect x="54" y="408" width="56" height="22" rx="6" fill="#e6f2ea" stroke="#bfe0cb"/><text x="82" y="423" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#15803d">BP4</text><text x="120" y="423" class="name">Computational evidence of tolerance</text><rect x="398" y="408" width="52" height="22" rx="11" fill="#15803d"/><text x="424" y="423" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">-1</text></g>
    <g><rect x="54" y="438" width="56" height="22" rx="6" fill="#e6f2ea" stroke="#bfe0cb"/><text x="82" y="453" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#15803d">BP7</text><text x="120" y="453" class="name">Synonymous, no predicted splice impact</text><rect x="398" y="438" width="52" height="22" rx="11" fill="#15803d"/><text x="424" y="453" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">-1</text></g>
  </g>
  <text x="54" y="484" class="tiny">PM2 is applied at Supporting strength (+1) per current ClinGen SVI guidance.</text>
  <text x="54" y="500" class="tiny">PVS1 is firmed with gnomAD constraint; otherwise flagged provisional.</text>

  <!-- Right panel -->
  <rect x="486" y="84" width="438" height="430" rx="12" fill="#fbf8f1" stroke="#ddd3bf" stroke-width="1.5"/>
  <text x="504" y="112" class="h">Points to classification</text>

  <g>
    <rect x="504" y="126" width="84" height="26" fill="#d7e8dd"/>
    <rect x="588" y="126" width="90" height="26" fill="#e2f0e7"/>
    <rect x="678" y="126" width="90" height="26" fill="#ece7d8"/>
    <rect x="768" y="126" width="60" height="26" fill="#f7e2cd"/>
    <rect x="828" y="126" width="68" height="26" fill="#f3d3ce"/>
    <rect x="504" y="126" width="392" height="26" fill="none" stroke="#ddd3bf"/>
    <text x="546" y="172" text-anchor="middle" class="tiny" fill="#15803d" font-weight="700">Benign</text>
    <text x="546" y="186" text-anchor="middle" class="tiny">-7 or less</text>
    <text x="633" y="172" text-anchor="middle" class="tiny" fill="#16a34a" font-weight="700">Likely Benign</text>
    <text x="633" y="186" text-anchor="middle" class="tiny">-6 to -1</text>
    <text x="723" y="172" text-anchor="middle" class="tiny" fill="#665d4c" font-weight="700">VUS</text>
    <text x="723" y="186" text-anchor="middle" class="tiny">0 to 5</text>
    <text x="798" y="172" text-anchor="middle" class="tiny" fill="#ea580c" font-weight="700">Likely Path.</text>
    <text x="798" y="186" text-anchor="middle" class="tiny">6 to 9</text>
    <text x="862" y="172" text-anchor="middle" class="tiny" fill="#b91c1c" font-weight="700">Pathogenic</text>
    <text x="862" y="186" text-anchor="middle" class="tiny">10 or more</text>
  </g>

  <text x="504" y="218" class="h" font-size="13">Worked examples (the demo chips)</text>

  <rect x="496" y="230" width="418" height="50" rx="8" fill="#fffdf8" stroke="#eadfce"/>
  <text x="510" y="251" class="mono" font-size="12" font-weight="700" fill="#221d15">BRCA1:c.5266dupC</text>
  <text x="510" y="270" class="tiny">PVS1 +8, PM2 +1  =  +9</text>
  <rect x="772" y="244" width="130" height="24" rx="12" fill="#f7e2cd"/>
  <text x="837" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#ea580c">Likely Pathogenic</text>

  <rect x="496" y="290" width="418" height="50" rx="8" fill="#fffdf8" stroke="#eadfce"/>
  <text x="510" y="311" class="mono" font-size="12" font-weight="700" fill="#221d15">CFTR:c.1408A&gt;G</text>
  <text x="510" y="330" class="tiny">BA1 stand-alone override (AF about 55 percent)</text>
  <rect x="822" y="304" width="80" height="24" rx="12" fill="#dcefe2"/>
  <text x="862" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Benign</text>

  <rect x="496" y="350" width="418" height="50" rx="8" fill="#fffdf8" stroke="#eadfce"/>
  <text x="510" y="371" class="mono" font-size="12" font-weight="700" fill="#221d15">BRCA1:c.5096G&gt;A</text>
  <text x="510" y="390" class="tiny">PM5 +2, PP3 +1 (AlphaMissense)  =  +3</text>
  <rect x="782" y="364" width="120" height="24" rx="12" fill="#eae4d6"/>
  <text x="842" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#665d4c">Uncertain (VUS)</text>

  <text x="504" y="428" class="sub">The model reads messy evidence and returns a clean per-criterion verdict.</text>
  <text x="504" y="446" class="sub">The engine owns the arithmetic, so the same verdicts always give the same label.</text>
  <text x="504" y="470" class="tiny">Ten criteria are automated; eight more (PS2, PS3, PS4, PM3, PM6, PP1, BS3, BS4) are</text>
  <text x="504" y="485" class="tiny">curator-supplied and recompute live. A second Claude pass reviews the draft.</text>
</svg>
